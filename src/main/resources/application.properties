# ===================================================================
# Application
# ===================================================================
spring.application.name=inventoryapp
server.port=${PORT:8082}
# ===================================================================
# Datasource (PostgreSQL)
# ===================================================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/inventory_entry}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
# ===================================================================
logging.level.root=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.example.inventoryapp=ERROR

inventory.write.strategy=sync
#hikaricp
#maximum nof of connection allowed in pool
spring.datasource.hikari.maximum-pool-size=50
#minimum number of idle connection hikaricp tries to maintain
spring.datasource.hikari.minimum-idle=5
#maximum time your app will wait for a connection before throwing timeout
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=InventoryHikariPool
#if connection is not returned to pool within threshold hikari print a stack trace
spring.datasource.hikari.leak-detection-threshold=6000
management.endpoints.web.exposure.include=health,metrics
management.metrics.enable.hikaricp=true



